<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@100;200;300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://code.jquery.com/jquery-3.6.0.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">

  <style>
    body {
      font-family: 'Sarabun', sans-serif;
    }

    table {
      border-collapse: collapse;
      width: 100%;
      font-size: 11px;
    }

    th, td {
      border: 1px solid black;
      padding: 4px 6px;
      line-height: 1.2;
      vertical-align: middle;
    }

    th {
      font-size: 12px;
      font-weight: bold;
    }

    .table-result {
      font-size: 0.75rem;
    }

    .container-sm {
      display: flex;
      flex-direction: row;
      justify-content: space-between;
    }

    .container-left {
      width: 85%;
    }

    .container-right {
      width: 15%;
    }

    .container-middle {
      width: 60%;
      flex-direction: row;
      background-color: brown;
    }

    .container-link {
      width: 40px;
      background-color: aqua;
    }

    @media print {
      @page {
        size: A4 landscape;
        margin: 8mm;
      }

      body * {
        visibility: hidden;
      }

      .print-area, .print-area * {
        visibility: visible;
      }

      .print-area {
        position: absolute;
        left: 0;
        top: 0;
        width: 100%;
      }

      .noprint {
        display: none !important;
      }

      body {
        font-family: Arial, sans-serif;
        font-size: 12px;
      }

      table {
        width: 100%;
        font-size: 10px;
      }

      th, td {
        padding: 3px 4px;
        line-height: 1.1;
      }

      #loading {
        display: none !important;
      }
    }
  </style>
</head>

<body>
  <div id="message"></div>

  <header class="d-flex flex-wrap justify-content-end py-3 mb-4 border-bottom noprint">
    <div class="container">

      <div class="container-sm noprint" style="font-family: sarabun;">
        <div class="container-left noprint">
          <p>ระบบค้นหาผลการตรวจสุขภาพทางอินเตอร์เน็ต</p>
        </div>
        <div class="container-right ms-5 text-end noprint" id="datetime"></div>
      </div>

      <p id="selectedValue" class="ms-2 fs-4 fw-bold noprint"></p>

      <div class="container-sm noprint">
        <ul class="nav justify-content-start noprint">
          <div class="d-flex gap-2 mb-3">
            <a href="index.html" class="btn btn-outline-secondary">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-house" viewBox="0 0 16 16">
                <path d="M8.707 1.5a1 1 0 0 0-1.414 0L.646 8.146a.5.5 0 0 0 .708.708L2 8.207V13.5A1.5 1.5 0 0 0 3.5 15h9a1.5 1.5 0 0 0 1.5-1.5V8.207l.646.647a.5.5 0 0 0 .708-.708L13 5.793V2.5a.5.5 0 0 0-.5-.5h-1a.5.5 0 0 0-.5.5v1.293zM13 7.207V13.5a.5.5 0 0 1-.5.5h-9a.5.5 0 0 1-.5-.5V7.207l5-5z"/>
              </svg>
            </a>

            <button type="button" id="printBtn" onclick="printResult()" class="btn btn-secondary ms-1">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-printer" viewBox="0 0 16 16">
                <path d="M2.5 8a.5.5 0 1 0 0-1 .5.5 0 0 0 0 1" />
                <path d="M5 1a2 2 0 0 0-2 2v2H2a2 2 0 0 0-2 2v3a2 2 0 0 0 2 2h1v1a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2v-1h1a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-1V3a2 2 0 0 0-2-2zM4 3a1 1 0 0 1 1-1h6a1 1 0 0 1 1 1v2H4zm1 5a2 2 0 0 0-2 2v1H2a1 1 0 0 1-1-1V7a1 1 0 0 1 1-1h12a1 1 0 0 1 1 1v3a1 1 0 0 1-1 1h-1v-1a2 2 0 0 0-2-2zm7 2v3a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1v-3a1 1 0 0 1 1-1h6a1 1 0 0 1 1 1" />
              </svg>
            </button>
          </div>
        </ul>

        <ul class="nav nav-tabs justify-content-end noprint">
          <li class="nav-item">
            <a class="nav-link active" href="pe.html" aria-current="page" aria-disabled="true">ผลตรวจสุขภาพทั่วไป</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="cbc.html">ความสมบูรณ์ของเม็ดเลือด</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="ua.html">ปัสสาวะทั่วไป</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="chem.html">ผลวิเคราะห์ทางห้องปฎิบัติการ</a>
          </li>
          <li class="nav-item text-end">
            <a class="nav-link" href="bio.html">ชีวอนามัย</a>
          </li>
        </ul>
      </div>
    </div>
  </header>

  <div class="container-md print-area" style="font-family: sarabun;">
    <span id="loading" class="fs-5 mt-2 mb-2"></span>

    <table class="table table-result mt-3">
      <thead class="table-info">
        <tr>
          <th scope="col" colspan="2" class="text-center">รหัสประจำตัว</th>
          <th scope="col" colspan="3" class="text-center">ชื่อ นามสกุล</th>
          <th scope="col" class="text-center">อายุ</th>
          <th scope="col" class="text-center">เพศ</th>
          <th scope="col" class="text-center">น้ำหนัก</th>
          <th scope="col" class="text-center">ส่วนสูง</th>
          <th scope="col" class="text-center">หมู่เลือด</th>
          <th scope="col" class="text-center">BMI</th>
          <th scope="col" class="text-center">BP</th>
          <th scope="col" class="text-center">Pause</th>
          <th scope="col" class="text-center">คลื่นไฟฟ้าหัวใจ</th>
          <th scope="col" class="text-center">Urine</th>
          <th scope="col" class="text-center">X Ray</th>
          <th scope="col" class="text-center">ความเห็นแพทย์</th>
        </tr>
      </thead>
      <tbody id="cbcresult"></tbody>
    </table>
  </div>

  <script>
    const BASE_URL = "https://script.google.com/macros/s/AKfycbxIFqg_sVoBadGiZijEkpghbLBNUiYMO9Zz_5eXxZ_JPSp457PnhJwPCRqTg_Qe8REQPA/exec";

    function printResult() {
      window.print();
    }

    function showLoading(message = "Waiting for loading......") {
      const loading = document.getElementById("loading");
      if (loading) {
        loading.style.display = "block";
        loading.innerText = message;
      }
    }

    function hideLoading() {
      const loading = document.getElementById("loading");
      if (loading) {
        loading.innerText = "";
        loading.style.display = "none";
      }
    }

    function fetchJson(url) {
      return fetch(url).then(response => {
        if (!response.ok) {
          throw new Error("HTTP error: " + response.status);
        }
        return response.json();
      });
    }

    function loadAllRecords() {
      const resultDiv1 = document.getElementById("cbcresult");
      const selectedText = document.getElementById("selectedValue");

      if (resultDiv1) {
        resultDiv1.innerHTML = "";
      }

      const selectedValue = String(
        localStorage.getItem("selectedCustomer") ||
        localStorage.getItem("selectedDropdownValue") ||
        ""
      ).trim();

      console.log("Selected Value:", selectedValue);

      if (selectedText) {
        selectedText.innerText = selectedValue;
      }

      if (!selectedValue) {
        if (resultDiv1) {
          resultDiv1.innerHTML = `
            <tr>
              <td colspan="17" class="text-center text-danger">ไม่พบข้อมูลผู้ใช้ กรุณาเข้าสู่ระบบใหม่</td>
            </tr>
          `;
        }
        return;
      }

      showLoading();

      fetchJson(BASE_URL + "?type=main")
        .then(data => {
          console.log("Data received from API:", data);

          if (!Array.isArray(data) || data.length === 0) {
            if (resultDiv1) {
              resultDiv1.innerHTML = `
                <tr>
                  <td colspan="17" class="text-center text-danger">ไม่พบข้อมูล</td>
                </tr>
              `;
            }
            hideLoading();
            return;
          }

          let found = false;

          data.forEach(row => {
            if (String(row.customer || "").trim() === selectedValue) {
              found = true;

              resultDiv1.innerHTML += `
                <tr>
                  <th class="text-center" scope="row" colspan="2">${row.register || ""}</th>
                  <td colspan="3">${row.name || ""}</td>
                  <td class="text-center">${row.age || ""}</td>
                  <td class="text-center">${row.sex || ""}</td>
                  <td class="text-center">${row.waigh || ""}</td>
                  <td class="text-center">${row.tall || ""}</td>
                  <td class="text-center">${row.bg || ""}</td>
                  <td class="text-center">${row.bmiv || ""}</td>
                  <td class="text-center">${row.bp || ""}</td>
                  <td class="text-center">${row.pause || ""}</td>
                  <td class="text-center">${row.ekg || ""}</td>
                  <td class="text-center">${row.urine || ""}</td>
                  <td class="text-center">${row.xray || ""}</td>
                  <td class="text-center">${row.doctor || ""}</td>
                </tr>
              `;
            }
          });

          if (!found && resultDiv1) {
            resultDiv1.innerHTML = `
              <tr>
                <td colspan="17" class="text-center text-danger">ไม่พบข้อมูลของผู้ใช้ที่เลือก</td>
              </tr>
            `;
          }

          hideLoading();
        })
        .catch(error => {
          console.error("Error fetching data:", error);

          if (resultDiv1) {
            resultDiv1.innerHTML = `
              <tr>
                <td colspan="17" class="text-center text-danger">เกิดข้อผิดพลาดในการดึงข้อมูล</td>
              </tr>
            `;
          }

          hideLoading();
        });
    }

    document.addEventListener("DOMContentLoaded", loadAllRecords);
  </script>

  <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js"></script>
</body>
</html>
