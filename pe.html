<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: Sarabun, sans-serif;
    }

    table {
      border-collapse: collapse;
      width: 100%;
      font-size: 11px;
    }

    th, td {
      border: 1px solid black;
      padding: 4px 6px;
      line-height: 1.2;
    }

    th {
      font-size: 12px;
      font-weight: bold;
    }

    .table-result {
      font-size: 0.75rem;
    }

    /* PRINT */
    @media print {
      @page {
        size: A4 landscape;
        margin: 8mm;
      }

      body * {
        visibility: hidden;
      }

      .print-area, .print-area * {
        visibility: visible;
      }

      .print-area {
        position: absolute;
        left: 0;
        top: 0;
        width: 100%;
      }

      .noprint {
        display: none !important;
      }

      table {
        font-size: 10px;
      }

      th, td {
        padding: 3px 4px;
      }
    }

    .container-sm {
      display: flex;
      justify-content: space-between;
    }

    .container-left { width: 85%; }
    .container-right { width: 15%; }
  </style>
</head>

<body>

  <!-- HEADER -->
  <header class="border-bottom mb-3 noprint">
    <div class="container">
      <div class="container-sm">
        <div class="container-left">
          <p>ระบบค้นหาผลการตรวจสุขภาพทางอินเตอร์เน็ต</p>
        </div>
        <div class="container-right text-end" id="datetime"></div>
      </div>

      <p id="selectedValue" class="fs-5 fw-bold"></p>

      <div class="d-flex gap-2 mb-2">
        <a href="index.html" class="btn btn-outline-secondary">🏠</a>

        <button onclick="printResult()" class="btn btn-secondary">
          🖨 พิมพ์
        </button>
      </div>

      <ul class="nav nav-tabs">
        <li class="nav-item">
          <a class="nav-link active">ผลตรวจสุขภาพทั่วไป</a>
        </li>
        <li class="nav-item"><a class="nav-link" href="cbc.html">CBC</a></li>
        <li class="nav-item"><a class="nav-link" href="ua.html">Urine</a></li>
        <li class="nav-item"><a class="nav-link" href="chem.html">Chem</a></li>
        <li class="nav-item"><a class="nav-link" href="bio.html">Bio</a></li>
      </ul>
    </div>
  </header>

  <!-- CONTENT (PRINT AREA) -->
  <div class="container print-area">

    <span id="loading" class="fs-5"></span>

    <table class="table table-result mt-3">
      <thead class="table-info">
        <tr>
          <th colspan="2">รหัส</th>
          <th colspan="3">ชื่อ</th>
          <th>อายุ</th>
          <th>เพศ</th>
          <th>น้ำหนัก</th>
          <th>สูง</th>
          <th>เลือด</th>
          <th>BMI</th>
          <th>BP</th>
          <th>Pulse</th>
          <th>EKG</th>
          <th>Urine</th>
          <th>X-Ray</th>
          <th>แพทย์</th>
        </tr>
      </thead>
      <tbody id="cbcresult"></tbody>
    </table>

  </div>

  <script>
    function printResult() {
      window.print();
    }

    const BASE_URL = "https://script.google.com/macros/s/AKfycbxIFqg_sVoBadGiZijEkpghbLBNUiYMO9Zz_5eXxZ_JPSp457PnhJwPCRqTg_Qe8REQPA/exec";

    function fetchJson(url) {
      return fetch(url).then(r => r.json());
    }

    function loadAllRecords() {
      const result = document.getElementById("cbcresult");
      result.innerHTML = "";

      const selected = localStorage.getItem("selectedCustomer") || "";

      if (!selected) {
        result.innerHTML = `<tr><td colspan="17">ไม่พบข้อมูล</td></tr>`;
        return;
      }

      fetchJson(BASE_URL + "?type=main")
        .then(data => {
          let found = false;

          data.forEach(row => {
            if (row.customer === selected) {
              found = true;

              result.innerHTML += `
                <tr>
                  <td colspan="2">${row.register}</td>
                  <td colspan="3">${row.name}</td>
                  <td>${row.age}</td>
                  <td>${row.sex}</td>
                  <td>${row.waigh}</td>
                  <td>${row.tall}</td>
                  <td>${row.bg}</td>
                  <td>${row.bmiv}</td>
                  <td>${row.bp}</td>
                  <td>${row.pause}</td>
                  <td>${row.ekg}</td>
                  <td>${row.urine}</td>
                  <td>${row.xray}</td>
                  <td>${row.doctor}</td>
                </tr>`;
            }
          });

          if (!found) {
            result.innerHTML = `<tr><td colspan="17">ไม่พบข้อมูล</td></tr>`;
          }
        });
    }

    document.addEventListener("DOMContentLoaded", loadAllRecords);
  </script>

</body>
</html>
