<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

  <title>รายงานผลตรวจสุขภาพทางอินเตอร์เน็ต</title>

  <style>
    :root {
      --brand: #0f9d7a;
      --brand-deep: #123f46;
      --muted: #5f6f73;
    }

    html,
    body {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: "Sarabun", sans-serif;
      margin: 0;
      color: #555;
      background-image: url("pic/CheckUP.png");
      background-size: cover;
      background-position: center;
    }

    label {
      font-weight: 600;
    }

    #selectedValue,
    #fullname {
      font-family: "Sarabun", sans-serif;
    }

    .wrapper {
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      width: 20%;
      min-width: 290px;
      height: 100vh;
      overflow-y: auto;
      background-color: rgb(225, 232, 236);
      color: teal;
      padding: 20px;
      border-right: 1px solid #023636;
      box-shadow: 2px 0 10px rgba(0, 0, 0, 0.2),
        inset -2px 0 5px rgba(255, 255, 255, 0.1);
    }

    .print-area {
      height: 100vh;
      margin-left: max(20%, 290px);
      width: calc(100% - max(20%, 290px));
      padding: 20px;
      color: teal;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      font-family: "Sarabun", sans-serif;
    }

    .nav-title {
      max-width: 760px;
    }

    .nav-kicker {
      margin: 0 0 8px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--brand);
    }

    .nav-title h1 {
      margin: 0;
      font-size: clamp(24px, 3vw, 36px);
      line-height: 1.06;
      color: var(--brand-deep);
    }

    .nav-title p {
      margin: 10px 0 0;
      color: var(--muted);
      line-height: 1.7;
      font-size: 14px;
    }

    .logo-box {
      width: 60%;
      height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .logo-box img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .b-example-divider {
      width: 100%;
      height: 0.1rem;
      background-color: rgba(0, 0, 0, 0.1);
      border: solid rgba(0, 0, 0, 0.15);
      border-width: 1px 0;
      box-shadow: inset 0 0.5em 1.5em rgba(0, 0, 0, 0.1),
        inset 0 0.125em 0.5em rgba(0, 0, 0, 0.15);
    }

    .menu {
      font-family: "Sarabun", sans-serif;
      width: 100%;
      padding: 12px;
      background: #eef6f7;
      border-radius: 14px;
      font-size: 0.75rem;
    }

    .menu ul {
      list-style: none;
      padding-left: 0;
      margin: 0;
    }

    .menu ul ul {
      padding-left: 15px;
    }

    .menu li {
      margin: 4px 0;
    }

    .menu-label,
    .menu a {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 10px;
      border-radius: 10px;
      color: #123;
      text-decoration: none;
      cursor: pointer;
      transition: 0.2s;
    }

    .menu-label:hover,
    .menu a:hover {
      background: #d8f3f1;
      color: #006b66;
    }

    .icon {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #d9eeee;
      color: #00796b;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 13px;
      flex-shrink: 0;
    }

    .child-menu {
      display: none;
    }

    .child-menu.open {
      display: block;
    }

    .menu a.active {
      background: linear-gradient(135deg, #00a99d, #00897b);
      color: white;
      font-weight: 600;
      box-shadow: 0 4px 10px rgba(0, 137, 123, 0.28);
    }

    .menu a.active::before {
      content: "●";
      font-size: 9px;
      color: white;
    }

    .navbar {
      flex: 0 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: stretch;
    }

    #loading {
      flex: 0 0 auto;
    }

    .table-scroll-only {
      flex: 1 1 auto;
      min-height: 0;
      overflow-y: auto;
      overflow-x: auto;
      border: 1px solid #dee2e6;
      border-radius: 10px;
      background: #fff;
    }

    #mainTable {
      width: 100%;
      min-width: 820px;
      margin: 0;
      border-collapse: collapse;
      table-layout: fixed;
      font-family: "Sarabun", "Noto Sans Thai", Arial, sans-serif;
    }

    #mainTable th {
      position: sticky;
      top: 0;
      z-index: 20;
      background-color: #2c5f6e;
      color: white;
      padding: 10px 8px;
      font-weight: 600;
      font-size: 13px;
      white-space: nowrap;
      text-align: center;
      border: 1px solid #c8d6dc;
    }

    #mainTable td {
      padding: 8px 6px;
      font-size: 0.75rem;
      border: 1px solid #c8d6dc;
      text-align: center;
      vertical-align: middle;
    }

    #mainTable tr:nth-child(even) {
      background-color: #f8fafc;
    }

    #mainTable .text-danger-custom {
      color: #c62828;
      font-weight: 700;
      background-color: #ffebee;
    }

    .table-result {
      border: 1px solid #000;
      border-collapse: collapse;
    }

    @media (max-width: 900px) {
      html,
      body {
        overflow: auto;
      }

      .wrapper {
        display: block;
        height: auto;
        overflow: visible;
      }

      .sidebar {
        position: relative;
        width: 100%;
        min-width: 0;
        height: auto;
        max-height: none;
      }

      .print-area {
        width: 100%;
        height: auto;
        margin-left: 0;
        overflow: visible;
      }
    }

    @media print {
      html,
      body,
      .wrapper,
      .print-area,
      .table-scroll-only {
        height: auto !important;
        overflow: visible !important;
        display: block !important;
      }

      body {
        margin: 0 !important;
        padding: 0 !important;
        width: 100% !important;
        background: white !important;
      }

      .sidebar,
      .noprint,
      .btn,
      .icon-link,
      #loading,
      .b-example-divider,
      .logo-box {
        display: none !important;
      }

      .print-area {
        width: 100% !important;
        max-width: 100% !important;
        margin: 0 !important;
        padding: 12px 15px !important;
        background: white !important;
        color: black !important;
        box-sizing: border-box !important;
      }

      .table-scroll-only {
        border: none !important;
      }

      table,
      #mainTable {
        width: 100% !important;
        max-width: 100% !important;
        min-width: 0 !important;
        table-layout: fixed !important;
        font-size: 9pt !important;
        border-collapse: collapse !important;
        word-wrap: break-word !important;
      }

      th,
      td {
        border: 1px solid #aaa !important;
        padding: 5px 4px !important;
        font-size: 8pt !important;
        color: #000 !important;
        text-align: center !important;
        vertical-align: middle !important;
      }

      .navbar {
        display: block !important;
        background: white !important;
        margin-bottom: 10px !important;
        border-bottom: 2px solid #0f9d7a;
      }

      .nav-title h1 {
        font-size: 14pt !important;
        margin-bottom: 5px !important;
      }

      * {
        box-shadow: none !important;
        transform: none !important;
      }
    }
  </style>
</head>

  <script>
    const BASE_URL = "https://script.google.com/macros/s/AKfycbxUsKMa2bwRjuxX8ZlvuJQiD7Y5PkAziCrPI9pIe8atrRFtrUnB8ES9edWCZrxu6EdSTA/exec";

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function exportXCEL() {
      const table = document.getElementById("mainTable");

      if (!table) {
        alert("ไม่พบตารางสำหรับส่งออก Excel");
        return;
      }

      const workbook = XLSX.utils.book_new();
      const worksheet = XLSX.utils.table_to_sheet(table, { raw: true });

      XLSX.utils.book_append_sheet(workbook, worksheet, "Report");
      XLSX.writeFile(workbook, "รายงานผลตรวจสุขภาพ.xlsx");
    }

    function getPrintableTable() {
      return document.getElementById("mainTable") || document.querySelector(".table.table-result");
    }

    function getPrintableTitle() {
      const heading = document.querySelector(".nav-title h1");
      if (heading) {
        return heading.textContent.replace(/\s+/g, " ").trim();
      }

      return document.title || "Report";
    }

    function stylePrintableTable(table) {

  table.style.width = "100%";
  table.style.borderCollapse = "collapse";
  table.style.tableLayout = "fixed";

  /*
    คอลัมน์ใหม่

    1 = 5%
    2 = 15%
    3 = 5%
    4 = 15%
    5 = 5%
    6 = 5%
    7 = ที่เหลือ = 50%
  */

  const widths = [
    "5%",
    "15%",
    "5%",
    "15%",
    "5%",
    "5%",
    "50%"
  ];

  // ลบ colgroup เดิม
  const oldColgroup = table.querySelector("colgroup");
  if (oldColgroup) {
    oldColgroup.remove();
  }

  // สร้าง colgroup ใหม่
  const colgroup = document.createElement("colgroup");

  widths.forEach(width => {
    const col = document.createElement("col");
    col.style.width = width;
    colgroup.appendChild(col);
  });

  table.prepend(colgroup);

  // style ทุก cell
  Array.from(table.querySelectorAll("th, td")).forEach(cell => {

    cell.style.border = "1px solid #9fb3bf";

    cell.style.padding = "3px 4px";

    // 🔥 ขนาดตัวอักษรเท่าหน้าอื่น
    cell.style.fontSize = "7pt";

    cell.style.lineHeight = "1.15";

    cell.style.boxSizing = "border-box";

    cell.style.verticalAlign = "middle";

    cell.style.textAlign = "center";

    cell.style.wordBreak = "break-word";

    cell.style.overflowWrap = "break-word";
  });

  // HEADER
  Array.from(table.querySelectorAll("thead th")).forEach(cell => {

    cell.style.background = "#dbeaf1";

    cell.style.fontWeight = "700";

    // 🔥 ขนาด header เท่าหน้าอื่น
    cell.style.fontSize = "7pt";

    cell.style.textAlign = "center";
  });

  // BODY
  table.querySelectorAll("tbody tr").forEach(row => {

    // คอลัมน์ 2 = ชื่อ
    const nameCell = row.children[1];

    if (nameCell) {

      nameCell.style.textAlign = "left";

      nameCell.style.whiteSpace = "nowrap";

      nameCell.style.overflow = "hidden";

      nameCell.style.textOverflow = "ellipsis";

      nameCell.style.fontSize = "6.8pt";
    }

    // คอลัมน์ 4
    const deptCell = row.children[3];

    if (deptCell) {

      deptCell.style.textAlign = "left";

      deptCell.style.fontSize = "6.8pt";

      deptCell.style.lineHeight = "1.05";
    }

    // คอลัมน์ 7 = ข้อความยาว
    const resultCell = row.children[6];

    if (resultCell) {

      resultCell.style.textAlign = "left";

      resultCell.style.whiteSpace = "normal";

      resultCell.style.fontSize = "6.5pt";

      resultCell.style.lineHeight = "1.08";

      resultCell.style.wordBreak = "break-word";

      resultCell.style.overflowWrap = "break-word";
    }
  });
}

    function buildPrintableReport() {
      const table = getPrintableTable();
      if (!table) return null;

      const tbody = table.querySelector("tbody");
      if (!tbody) return null;

      const rows = Array.from(tbody.querySelectorAll("tr"));
      const hasData = rows.some(row => !row.querySelector(".text-danger"));
      if (!hasData) return null;

      const root = document.createElement("div");
      root.style.width = "100%";
      root.style.maxWidth = "1123px";
      root.style.margin = "0 auto";
      root.style.fontFamily = "'Sarabun', sans-serif";
      root.style.background = "#fff";

      const title = getPrintableTitle();
      const selectedValue = (document.getElementById("selectedValue")?.textContent || "").trim();
      const printedAt = new Date().toLocaleString("th-TH");
      const rowsPerPage = 28;
      const totalPages = Math.ceil(rows.length / rowsPerPage);

      for (let pageIndex = 0; pageIndex < totalPages; pageIndex++) {
        const page = document.createElement("div");
        page.style.padding = "10mm 12mm 10mm 18mm";
        page.style.pageBreakAfter = pageIndex === totalPages - 1 ? "auto" : "always";
        page.style.width = "100%";
        page.style.boxSizing = "border-box";
        page.style.display = "flex";
        page.style.flexDirection = "column";

        const header = document.createElement("div");
        header.style.display = "flex";
        header.style.justifyContent = "space-between";
        header.style.borderBottom = "2px solid #3c6e71";
        header.style.marginBottom = "5mm";
        header.innerHTML = `
          <div>
            <div style="font-size:14px;font-weight:700;">${escapeHtml(title)}</div>
            <div style="font-size:10px;">${escapeHtml(selectedValue)}</div>
          </div>
          <div style="font-size:9px;text-align:right;">
            Page ${pageIndex + 1} / ${totalPages}<br>
            ${escapeHtml(printedAt)}
          </div>
        `;

        page.appendChild(header);

        const pageTable = table.cloneNode(false);
        const headClone = table.querySelector("thead").cloneNode(true);
        const bodyClone = document.createElement("tbody");
        const start = pageIndex * rowsPerPage;
        const end = start + rowsPerPage;

        rows.slice(start, end).forEach(row => {
          bodyClone.appendChild(row.cloneNode(true));
        });

        pageTable.appendChild(headClone);
        pageTable.appendChild(bodyClone);
        pageTable.style.width = "100%";
        pageTable.style.tableLayout = "fixed";
        pageTable.style.borderCollapse = "collapse";

        stylePrintableTable(pageTable);

        const tableWrapper = document.createElement("div");
        tableWrapper.style.flex = "1";
        tableWrapper.appendChild(pageTable);

        page.appendChild(tableWrapper);
        root.appendChild(page);
      }

      return root;
    }

    function printReport() {
      const reportRoot = buildPrintableReport();
      if (!reportRoot) {
        alert("ไม่มีข้อมูลสำหรับพิมพ์รายงาน");
        return;
      }

      const printWindow = window.open("", "_blank", "width=1280,height=900");
      if (!printWindow) {
        alert("Unable to open print preview.");
        return;
      }

      printWindow.document.write(`<!DOCTYPE html>
        <html>
        <head>
          <meta charset="UTF-8">
          <title>Print Report</title>
          <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
        </head>
        <body style="margin:0;background:#fff;">${reportRoot.innerHTML}</body>
        </html>`);
      printWindow.document.close();
      printWindow.focus();

      setTimeout(() => {
        printWindow.print();
        printWindow.close();
      }, 500);
    }

    function exportPDF() {
      const reportRoot = buildPrintableReport();
      if (!reportRoot) {
        alert("ไม่มีข้อมูลสำหรับส่งออก PDF");
        return;
      }

      const printWindow = window.open("", "_blank");
      if (!printWindow) {
        alert("Unable to open print preview.");
        return;
      }

      printWindow.document.write(`
        <!DOCTYPE html>
        <html>
        <head>
          <meta charset="UTF-8">
          <title>Report</title>
          <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
          <style>
            @page {
              size: A4 landscape;
              margin: 12mm 10mm;
            }

            html,
            body {
              margin: 0;
              font-family: "Sarabun", sans-serif;
              background: #fff;
            }

              width: 100%;
              border-collapse: collapse;
             
            }

          th,
td {
  border: 1px solid #999;
  padding: 3px 4px;
  font-size: 7pt;
  line-height: 1.15;
  box-sizing: border-box;
}

              display: table-header-group;

              page-break-inside: avoid;

          </style>

        <body>${reportRoot.innerHTML}</body>
        </html>
      `);

      printWindow.document.close();

      setTimeout(() => {
        printWindow.focus();
        printWindow.print();
      }, 500);
    }

    function showLoading(message = "Waiting for loading......") {
      const loading = document.getElementById("loading");
      if (loading) {
        loading.style.display = "block";
        loading.innerText = message;
      }
    }

    function hideLoading() {
      const loading = document.getElementById("loading");
      if (loading) {
        loading.innerText = "";
        loading.style.display = "none";
      }
    }

    function fetchJson(url) {
      return fetch(url).then(response => {
        if (!response.ok) {
          throw new Error("HTTP error: " + response.status);
        }

        return response.json();
      });
    }

    function loadAllRecords() {
      const resultBody = document.getElementById("cbcresult");
      const selectedText = document.getElementById("selectedValue");

      if (resultBody) {
        resultBody.innerHTML = "";
      }

      const selectedValue = String(
        localStorage.getItem("selectedCustomer") ||
        localStorage.getItem("selectedDropdownValue") ||
        ""
      ).trim();

      if (selectedText) {
        selectedText.innerText = selectedValue;
      }

      if (!selectedValue) {
        if (resultBody) {
          resultBody.innerHTML = `
            <tr>
              <td colspan="7" class="text-center text-danger">ไม่พบข้อมูลผู้ใช้ กรุณาเข้าสู่ระบบใหม่</td>
            </tr>
          `;
        }
        return;
      }

      showLoading();

      fetchJson(BASE_URL + "?type=main")
        .then(data => {
          if (!Array.isArray(data) || data.length === 0) {
            if (resultBody) {
              resultBody.innerHTML = `
                <tr>
                  <td colspan="7" class="text-center text-danger">ไม่พบข้อมูล</td>
                </tr>
              `;
            }
            hideLoading();
            return;
          }

          let found = false;
          const htmlRows = [];

          data.forEach(row => {
            if (String(row.zraydr || "").trim() === selectedValue) {
              found = true;

              htmlRows.push(`
                <tr>
                  <td class="id-col">${escapeHtml(row.xrayhn)}</td>
                  <td class="text-start">${escapeHtml(row.xrayname)}</td>
                  <td>${escapeHtml(row.xrayage)}</td>
                  <td>${escapeHtml(row.xraydep)}</td>
                  <td>${escapeHtml(row.xrayid)}</td>
                  <td>${row.xrayresult ? escapeHtml(row.xrayresult) + " mg/dL" : ""}</td>
                  <td class="text-start" > ${escapeHtml(row.xraysummary)}</td>
                </tr>
              `);
            }
          });

          if (found && resultBody) {
            resultBody.innerHTML = htmlRows.join("");
          }

          if (!found && resultBody) {
            resultBody.innerHTML = `
              <tr>
                <td colspan="7" class="text-center text-danger">ไม่พบข้อมูลของผู้ใช้ที่เลือก</td>
              </tr>
            `;
          }

          hideLoading();
        })
        .catch(error => {
          console.error("Error fetching data:", error);

          if (resultBody) {
            resultBody.innerHTML = `
              <tr>
                <td colspan="7" class="text-center text-danger">เกิดข้อผิดพลาดในการดึงข้อมูล</td>
              </tr>
            `;
          }

          hideLoading();
        });
    }

    document.addEventListener("DOMContentLoaded", function () {
      const fullname = localStorage.getItem("fullname") || "";
      const fullnameElement = document.getElementById("fullname");

      if (fullnameElement) {
        fullnameElement.textContent = fullname;
      }

      loadAllRecords();
    });
  </script>

      { text: "ตรวจคลื่นไฟฟ้าหัวใจ", link: "ekg.html" },
      {
        text: "ผลตรวจทางห้องปฏิบัติการ",
        open: true,
        children: [
          { text: "ค่าความสมบูรณ์ของเม็ดเลือด", link: "cbc.html" },

            ]

            children: [

          { text: "สมรรถภาพความจุปอด(Spirometry)", link: "spiro.html" },

          { text: "สมรรถภาพกล้ามเนื้อมือ", link: "hand.html" },
          { text: "สมรรถภาพกล้ามเนื้อแรงเหยียดขาและหลัง", link: "lb.html" }
        ]
      }
    ];

    function createMenu(items) {
      const ul = document.createElement("ul");

      items.forEach(item => {
        const li = document.createElement("li");

        if (item.children && item.children.length > 0) {
          const label = document.createElement("span");
          label.className = "menu-label";

          const icon = document.createElement("span");
          icon.className = "icon";
          icon.textContent = item.open ? "−" : "+";

          label.appendChild(icon);
          label.appendChild(document.createTextNode(item.text));

          const childMenu = createMenu(item.children);
          childMenu.className = "child-menu";

          if (item.open) {
            childMenu.classList.add("open");
          }

          label.onclick = function () {
            childMenu.classList.toggle("open");
            icon.textContent = childMenu.classList.contains("open") ? "−" : "+";
          };

          li.appendChild(label);
          li.appendChild(childMenu);
        } else {
          const a = document.createElement("a");
          a.href = item.link;
          a.textContent = item.text;
          li.appendChild(a);
        }

        ul.appendChild(li);
      });

      return ul;
    }

    document.addEventListener("DOMContentLoaded", function () {
      const menuBox = document.getElementById("dynamicMenu");
      if (!menuBox) return;

      menuBox.innerHTML = "";
      menuBox.appendChild(createMenu(menuData));

      const currentPage = window.location.pathname.split("/").pop() || "fbs.html";

      menuBox.querySelectorAll("a").forEach(a => {
        const hrefPage = a.getAttribute("href");
        if (hrefPage === currentPage) {
          a.classList.add("active");

          let parent = a.parentElement;
          while (parent && parent !== menuBox) {
            if (parent.classList && parent.classList.contains("child-menu")) {
              parent.classList.add("open");

              const label = parent.previousElementSibling;
              if (label) {
                const icon = label.querySelector(".icon");
                if (icon) icon.textContent = "−";
              }
            }

            parent = parent.parentElement;
          }
        }
      });
    });
  </script>
