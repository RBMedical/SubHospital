<!DOCTYPE html>

<head>

  <style>
    body {
      font-family: "Noto Sans Thai", sans-serif;
      background-image: url("pic/back.png");
      font-size: 0.95rem;
    
    }

    .page-wrap {
      padding-top: 16px;
      padding-bottom: 24px;
    }

    .result-layout {
      display: flex;
      gap: 16px;
      align-items: flex-start;
    }

    .result-left,
    .result-right {
      background: #fff;
      border: 1px solid #d9dee3;
      border-radius: 12px;
      padding: 14px;

    }

    .result-left {
      width: 50%;

    .result-right {

    }

    .line-sep {
      border-bottom: 1px solid #d6d6d6;
      margin: 4px 0 10px;
    }

    .section-title {
      font-weight: 700;
      font-size: 1rem;
      margin-bottom: 8px;
    }

    .table th,
    .table td {
      vertical-align: middle;
    }

    .table-sm-custom td,
    .table-sm-custom th {
      padding: .4rem .45rem;
      font-size: .83rem;
    }

    .click-link {
      color: #0d6efd;
      cursor: pointer;
      text-decoration: underline;
    }

    .modal-waiting {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.12);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 3000;
      padding: 16px;
    }

    .waiting-card {
      width: min(400px, 100%);
      background: rgba(255,255,255,.95);

      padding: 18px 20px;

    .custom-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.35);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 2500;
      padding: 12px;
    }

    .custom-modal {
      width: min(900px, 96vw);
      max-height: 90vh;
      overflow: auto;
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 18px 40px rgba(0,0,0,.25);

    .custom-modal .modal-header,

    .custom-modal .modal-footer {

    }

    #urinetable,

    }

    }

    @media (max-width: 768px) {

</head>

<body>
  <div class="page-wrap">

  <script>
    const BASE_URL = "https://script.google.com/macros/s/AKfycbx4wXV9Ihz7ljnDyblQS2FSUdyGZjEYuSNBaAOSny83DQ-PtEs8DItNrlqeUzaeNhWhDA/exec";

    let currentUser = null;
    let currentRegister = "";

    function setDatetime() {
      const el = document.getElementById("datetime");
      if (!el) return;
      const now = new Date();
      el.textContent = now.toLocaleString("th-TH");
    }

    function showWaiting() {
      document.getElementById("waiting").style.display = "flex";
    }

    function hideWaiting() {
      document.getElementById("waiting").style.display = "none";
    }

    function safe(v) {
      return v === null || v === undefined ? "" : v;
    }

    function resultClass(value) {
      return String(value).trim() === "ปกติ" ? "text-body-secondary" : "text-danger";
    }

    function fetchJson(url) {
      return fetch(url).then(response => {
        if (!response.ok) {
          throw new Error("HTTP " + response.status);
        }
        return response.json();
      });
    }

    function searchRecord() {
      const searchKey = document.getElementById("searchKey").value.trim();
      const password = document.getElementById("password").value.trim();

      if (!searchKey) {
        alert("กรุณากรอก User ID");
        return;
      }

      if (!password) {
        alert("กรุณากรอก Password");
        return;
      }

      showWaiting();

      fetchJson(BASE_URL + "?type=main")
        .then(data => {
          const resultDiv1 = document.getElementById("result");
          resultDiv1.innerHTML = "";

          if (!Array.isArray(data) || data.length === 0) {
            resultDiv1.innerHTML = '<div class="alert alert-danger">ไม่พบข้อมูล</div>';
            hideWaiting();
            return;
          }

          const foundUser = data.find(row =>
            String(row.username || "").trim() === searchKey &&
            String(row.pw || "").trim() === password
          );

          if (!foundUser) {
            resultDiv1.innerHTML = '<div class="alert alert-danger">User ID หรือ Password ไม่ถูกต้อง</div>';
            hideWaiting();
            return;
          }

          currentUser = foundUser;
          currentRegister = String(foundUser.register || "").trim();

          resultDiv1.innerHTML = renderMainResult(foundUser);
          document.getElementById("printBtn").disabled = false;

          renderCbcModal(foundUser);
          renderUrineModal(foundUser);

          return searchOutlab(currentRegister);
        })
        .catch(error => {
          console.error("❌ Error fetching data:", error);
          document.getElementById("result").innerHTML = '<div class="alert alert-danger">เกิดข้อผิดพลาดในการดึงข้อมูล</div>';
        })
        .finally(() => {
          hideWaiting();
        });
    }

                  <tr>

                  </tr>

                    <td class="text-center ${resultClass(foundUser.ldlr)}">${safe(foundUser.ldlr)}</td>

                  </tr>

                    <td class="text-center ${resultClass(foundUser.trir)}">${safe(foundUser.trir)}</td>

                  <tr><td class="fw-bold" colspan="3" style="background-color:powderblue;">การทำงานของตับ</td></tr>

                    <td class="text-center ${resultClass(foundUser.sgptr)}">${safe(foundUser.sgptr)}</td>

                  </tr>
                  <tr>

    function searchOutlab(registerValue) {
      if (!registerValue) {
        document.getElementById("outlab").innerHTML = `
          <tr><td colspan="5" class="text-center text-danger">ไม่พบเลข Register</td></tr>
        `;
        return Promise.resolve();
      }

      return fetchJson(BASE_URL + "?type=outlab")
        .then(data => {
          const resultDiv2 = document.getElementById("outlab");
          resultDiv2.innerHTML = "";

          let found = false;

          data.forEach(row => {
            if (String(row.register || "").trim() === String(registerValue).trim()) {
              resultDiv2.innerHTML += `
                <tr>
                  <th scope="row" colspan="3">${safe(row.test)}</th>
                  <td class="text-center">${safe(row.value)}</td>
                  <td class="text-center">${safe(row.result)}</td>
                </tr>
              `;
              found = true;
            }
          });

          if (!found) {
            resultDiv2.innerHTML = `
              <tr><td colspan="5" class="text-center text-danger">ไม่พบข้อมูลสำหรับ Register ID: ${registerValue}</td></tr>
            `;
          }
        })
        .catch(error => {
          console.error("❌ Error fetching outlab:", error);
          document.getElementById("outlab").innerHTML = `
            <tr><td colspan="5" class="text-center text-danger">เกิดข้อผิดพลาดในการดึงข้อมูล</td></tr>
          `;
        });
    }

    function loadAbnormal() {
  const hn = document.getElementById("HN").innerText.trim();

  if (hn === "") {
    alert("ไม่พบค่า HN");
    return;
  }

  const url = "https://script.google.com/macros/s/AKfycbw0Ufo4vXzReTJrX9kkYxjnXkFn9gtfEZQeWPx9tbryF_IAeXEuk0R58PJkKlES_7aZMw/exec?hn=" + encodeURIComponent(hn);

  fetch(url)
    .then(res => res.json())
    .then(data => {
      const resultBox = document.getElementById("abnormalResult");

      if (data.success) {
        resultBox.innerHTML = data.abnormal;
      } else {
        resultBox.innerHTML = data.message;
      }
    })
    .catch(err => {
      console.error(err);
      document.getElementById("abnormalResult").innerHTML =
        "เกิดข้อผิดพลาด";
    });
      openAbnormal();
}
