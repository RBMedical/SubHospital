  <script>
    const BASE_URL = "https://script.google.com/macros/s/AKfycbxIFqg_sVoBadGiZijEkpghbLBNUiYMO9Zz_5eXxZ_JPSp457PnhJwPCRqTg_Qe8REQPA/exec";

    function exportPDF() {
  const table = document.getElementById("mainTable");
  
  if (!table) {
    alert("ไม่พบตาราง");
    return;
  }

  const tbody = table.querySelector("tbody");
  if (!tbody) {
    alert("ไม่พบข้อมูลในตาราง");
    return;
  }

  const rows = tbody.querySelectorAll("tr");
  if (rows.length === 0) {
    alert("ไม่มีข้อมูลสำหรับส่งออก PDF");
    return;
  }

  console.log("จำนวนแถว:", rows.length);

  // สร้าง element สำหรับ PDF
  const pdfContent = document.createElement("div");
  pdfContent.style.display = "block";
  pdfContent.style.visibility = "visible";
  pdfContent.style.position = "relative";
  pdfContent.style.width = "297mm";
  pdfContent.style.backgroundColor = "white";
  pdfContent.style.fontFamily = "'Sarabun', sans-serif";

  // สร้างตารางใหม่สำหรับ PDF
  const pdfTable = document.createElement("table");
  pdfTable.style.width = "100%";
  pdfTable.style.borderCollapse = "collapse";
  pdfTable.style.fontSize = "10px";
  pdfTable.style.fontFamily = "'Sarabun', sans-serif";

  // สร้างหัวตาราง
  const thead = document.createElement("thead");
  const headerRow = document.createElement("tr");
  
  const headerTexts = [
    "รหัสประจำตัว", "ชื่อ นามสกุล", "อายุ", "เพศ", "น้ำหนัก", 
    "ส่วนสูง", "หมู่เลือด", "BMI", "BP", "Pause", 
    "คลื่นไฟฟ้าหัวใจ", "Urine", "X Ray", "ความเห็นแพทย์"
  ];

  headerTexts.forEach((text, idx) => {
    const th = document.createElement("th");
    th.textContent = text;
    th.style.backgroundColor = "#00796b";
    th.style.color = "white";
    th.style.padding = "8px 4px";
    th.style.border = "1px solid #00796b";
    th.style.textAlign = "center";
    th.style.fontSize = "9px";
    th.style.fontWeight = "600";
    th.style.wordWrap = "break-word";
    th.style.whiteSpace = "normal";
    
    // ✅ กำหนดความกว้างของคอลัมน์
    if (idx === 13) {
      th.style.minWidth = "120mm";
    } else if (idx === 1) {
      th.style.minWidth = "40mm";
    }
    
    headerRow.appendChild(th);
  });

  thead.appendChild(headerRow);
  pdfTable.appendChild(thead);

  // สร้างตัวหนังสือตาราง
  const tbodyElement = document.createElement("tbody");
  
  rows.forEach((row, index) => {
    const newRow = document.createElement("tr");
    const cells = row.querySelectorAll("td");
    
    console.log(`แถวที่ ${index + 1} มี ${cells.length} คอลัมน์`);
    
    cells.forEach((cell, cellIndex) => {
      const newCell = document.createElement("td");
      newCell.textContent = cell.textContent.trim();
      newCell.style.padding = "8px 4px";
      newCell.style.border = "1px solid #ddd";
      newCell.style.fontSize = "9px";
      newCell.style.textAlign = cellIndex === 1 || cellIndex === 13 ? "left" : "center";
      newCell.style.verticalAlign = "top";
      newCell.style.whiteSpace = "normal";
      
      // จัดสไตล์สำหรับคอลัมน์ชื่อ
      if (cellIndex === 1) {
        newCell.style.minWidth = "40mm";
      }
      
      // ✅ จัดสไตล์สำหรับคอลัมน์ความเห็นแพทย์
      if (cellIndex === 13) {
        newCell.style.minWidth = "120mm";
        newCell.style.maxWidth = "120mm";
        newCell.style.wordWrap = "break-word";
        newCell.style.overflow = "visible";
        newCell.style.whiteSpace = "normal";
        newCell.style.fontSize = "8px";
        newCell.style.lineHeight = "1.5";
        newCell.style.minHeight = "50px";
      }
      
      newRow.appendChild(newCell);
    });

    // แถวสลับสี
    if (index % 2 === 0) {
      newRow.style.backgroundColor = "#f9f9f9";
    }
    
    tbodyElement.appendChild(newRow);
  });

  pdfTable.appendChild(tbodyElement);
  
  // เพิ่มหัวข้อ
  const title = document.createElement("h2");
  title.textContent = "ผลตรวจสุขภาพทั่วไปโดยแพทย์/Physicle Example";
  title.style.textAlign = "center";
  title.style.color = "#0f9d7a";
  title.style.fontSize = "14px";
  title.style.marginBottom = "15px";
  title.style.marginTop = "0px";
  
  pdfContent.appendChild(title);
  pdfContent.appendChild(pdfTable);

  // เพิ่มเวลาพิมพ์
  const footer = document.createElement("p");
  footer.textContent = "พิมพ์เมื่อ: " + new Date().toLocaleString('th-TH');
  footer.style.marginTop = "15px";
  footer.style.fontSize = "10px";
  footer.style.color = "#666";
  footer.style.textAlign = "right";
  pdfContent.appendChild(footer);

  // ตั้งค่า html2pdf
  const opt = {
    margin: [10, 10, 10, 10],
    filename: "รายงานผลตรวจสุขภาพ.pdf",
    image: {
      type: "jpeg",
      quality: 0.98
    },
    html2canvas: {
      scale: 2,
      useCORS: true,
      allowTaint: true
    },
    jsPDF: {
      unit: "mm",
      format: "a4",
      orientation: "landscape"
    },
    pagebreak: {
      mode: ["avoid-all", "css", "legacy"]
    }
  };

  // ส่งออก PDF
  console.log("เริ่มการส่งออก PDF...");
  html2pdf().set(opt).from(pdfContent).save().then(() => {
    console.log("ส่งออก PDF เสร็จสิ้น");
  }).catch((error) => {
    console.error("Error:", error);
    alert("เกิดข้อผิดพลาดในการส่งออก PDF");
  });
}

    function showLoading(message = "Waiting for loading......") {
      const loading = document.getElementById("loading");
      if (loading) {
        loading.style.display = "block";
        loading.innerText = message;
      }
    }

    function hideLoading() {
      const loading = document.getElementById("loading");
      if (loading) {
        loading.innerText = "";
        loading.style.display = "none";
      }
    }

    function fetchJson(url) {
      return fetch(url).then(response => {
        if (!response.ok) {
          throw new Error("HTTP error: " + response.status);
        }
        return response.json();
      });
    }

    function loadAllRecords() {
      const resultDiv1 = document.getElementById("cbcresult");
      const selectedText = document.getElementById("selectedValue");

      if (resultDiv1) {
        resultDiv1.innerHTML = "";
      }

      const selectedValue =
        String(localStorage.getItem("selectedCustomer") || localStorage.getItem("selectedDropdownValue") || "").trim();

      console.log("🔹 Selected Value from Local Storage:", selectedValue);

      if (selectedText) {
        selectedText.innerText = selectedValue;
      }

      if (!selectedValue) {
        if (resultDiv1) {
          resultDiv1.innerHTML = `
            <tr>
              <td colspan="16" class="text-center text-danger">ไม่พบข้อมูลผู้ใช้ กรุณาเข้าสู่ระบบใหม่</td>
            </tr>
          `;
        }
        return;
      }

      showLoading();

      fetchJson(BASE_URL + "?type=main")
        .then(data => {
          console.log("🔹 Data received from API:", data);

          if (!Array.isArray(data) || data.length === 0) {
            console.warn("⚠️ No data found in API response:", data);
            if (resultDiv1) {
              resultDiv1.innerHTML = `
                <tr>
                  <td colspan="16" class="text-center text-danger">ไม่พบข้อมูล</td>
                </tr>
              `;
            }
            hideLoading();
            return;
          }

          let found = false;

          data.forEach(row => {
            console.log("🔹 Checking row:", row);

            if (String(row.customer || "").trim() === selectedValue) {
              found = true;

              resultDiv1.innerHTML += `
                <tr>
                <th class="text-center" scope="row" colspan="2">${row.register || ""}</th>
                  <td class="text-start" colspan="3">${row.name || ""}</td>
                  <td class="text-center">${row.fbsr || ""}</td>
                  <td class="text-center">${row.cholr || ""}</td>
                  <td class="text-center">${row.hdlr || ""}</td>
                  <td class="text-center">${row.ldlr || ""}</td>
                  <td class="text-center">${row.trir || ""}</td>
                  <td class="text-center">${row.sgptr || ""}</td>
                  <td class="text-center">${row.sgotr || ""}</td>
                 <td class="text-center">${row.alkr || ""}</td>
                  <td class="text-center">${row.bunr || ""}</td>
                  <td class="text-center">${row.crer || ""}</td>
                  <td class="text-center">${row.uricv || ""}</td>
                  <td class="text-center">${row.hbr || ""}</td>
                </tr>
              `;
            }
          });

          if (!found && resultDiv1) {
            resultDiv1.innerHTML = `
              <tr>
                <td colspan="16" class="text-center text-danger">ไม่พบข้อมูลของผู้ใช้ที่เลือก</td>
              </tr>
            `;
          }

          hideLoading();
        })
        .catch(error => {
          console.error("❌ Error fetching data:", error);

          if (resultDiv1) {
            resultDiv1.innerHTML = `
              <tr>
                <td colspan="16" class="text-center text-danger">เกิดข้อผิดพลาดในการดึงข้อมูล</td>
              </tr>
            `;
          }

          hideLoading();
        });
    }

    document.addEventListener("DOMContentLoaded", loadAllRecords);
  </script>
