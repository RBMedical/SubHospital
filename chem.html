  <style>
    body {
      font-family: 'Sarabun', sans-serif;
      margin: 0;
    }

    /* Layout */
    .wrapper {
      display: flex;
      height: 100vh;
    }

    .sidebar {
      position: fixed;
      width: 20%;
      background-color: rgb(225, 232, 236);
      color: teal;
      padding: 20px;
      border-right: 1px solid #023636;
      box-shadow: 2px 0 10px rgba(0, 0, 0, 0.2),
        inset -2px 0 5px rgba(255, 255, 255, 0.1);
    }

    .print-area {
      width: 80%;
      padding: 20px;
      color: teal;
      overflow-x: hidden;
      margin-left: 400px;
      width: calc(100% - 400px);
    }

    .content {
      width: 80%;
      padding: 20px;
      overflow: hidden;
    }

    /* Table container */
    .table-container {
      width: 90%;
      margin: auto;
    }

    .table-scroll {
      max-height: 400px;
      overflow-y: auto;
      border-radius: 10px;
      border: 1px solid #dee2e6;
    }

    /* Table */
    table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      font-size: 0.60rem;
    }

    th,
    td {
      padding: 10px;
      text-align: center;
      border-right: 1px solid #dee2e6;
      border-bottom: 1px solid #dee2e6;
      font-size: 0.60rem;
    }

    th:last-child,
    td:last-child {
      border-right: none;
    }

    tr:last-child td {
      border-bottom: none;
    }

    /* Sticky Header */
    thead th {
      position: sticky;
      top: 0;
      z-index: 10;
      background-color: #f8f9fa;
    }

    /* มุมโค้ง */
    thead th:first-child {
      border-top-left-radius: 10px;
    }

    thead th:last-child {
      border-top-right-radius: 10px;
    }

    .sidebar-menu {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .menu-item {
      padding: 12px 16px;
      color: #555;
      cursor: pointer;
      position: relative;
    }

    /* hover */
    .menu-item:hover {
      background-color: #f0f0f0;
    }

    /* active แบบในภาพ */
    .menu-item.active {
      background-color: #e6f4ef;
      /* เขียวอ่อน */
      color: #0f9d7a;
      /* เขียว */
      font-weight: 500;
    }

    /* เส้นด้านซ้าย */

      left: 0;
      top: 0;

      background-color: #0f9d7a;
      /* สีเขียวเข้ม */
      border-radius: 0 4px 4px 0;
    }

    .logo-box {
      width: 100%;
      height: 120px;


      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .logo-box img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      /* ไม่ยืดภาพ */
    }

    .headnav {
      display: flex;
      justify-content: space-between;
    }

    }

    .b-example-divider {

    @media print {

    /* สำหรับการพิมพ์ PDF */
    @media print {

        visibility: visible;
      }

      .pdf-capture {
        position: absolute;
        top: 0;
        left: 0;

    /* Responsive สำหรับหน้าจอเล็ก */

    .table-result {

        font-size: 14pt !important;
        margin-bottom: 5px !important;

    <script>
      const BASE_URL = "https://script.google.com/macros/s/AKfycbxIFqg_sVoBadGiZijEkpghbLBNUiYMO9Zz_5eXxZ_JPSp457PnhJwPCRqTg_Qe8REQPA/exec";


      function getPrintableTable() {
        return document.getElementById("mainTable") || document.querySelector(".table.table-result");
      }
      function getPrintableTitle() {
        const heading = document.querySelector(".navbar h5");
        if (heading) {
          return heading.textContent.replace(/\s+/g, " ").trim();
        }
        const navbar = document.querySelector(".navbar");
        if (!navbar) {
          return document.title || "Report";
        }
        const blocks = Array.from(navbar.querySelectorAll("div")).map(node =>
          node.textContent.replace(/\s+/g, " ").trim()
        ).filter(Boolean);
        return blocks[0] || document.title || "Report";
      }
      function getRowsPerPage(table) {
        const columnCount = table.querySelectorAll("thead tr:last-child th").length || 0;
        if (columnCount >= 17) return 18;
        if (columnCount >= 15) return 20;
        return 22;
      }
      function fitNameCell(cell) {
        const textLength = cell.textContent.trim().length;
        let fontSize = 8.4;
        if (textLength > 36) {
          fontSize = 7.1;
        } else if (textLength > 28) {
          fontSize = 7.6;
        } else if (textLength > 22) {
          fontSize = 8;
        }
        cell.style.fontSize = fontSize + "px";
        cell.style.whiteSpace = "nowrap";
        cell.style.overflow = "hidden";
        cell.style.textOverflow = "ellipsis";
      }
      function stylePrintableTable(table) {
        const totalCols = table.querySelectorAll("thead th").length;

        // reset style ก่อน
        Array.from(table.querySelectorAll("th, td")).forEach(cell => {
          cell.removeAttribute("style");
          cell.style.border = "1px solid #9fb3bf";
          cell.style.padding = "4px 5px";
          cell.style.verticalAlign = "middle";
          cell.style.textAlign = "center";
          cell.style.lineHeight = "1.25";
        });

        // header style
        Array.from(table.querySelectorAll("thead th")).forEach(cell => {
          cell.style.background = "#dbeaf1";
          cell.style.fontWeight = "700";
          cell.style.fontSize = "9pt";
        });

        // 🔥 กำหนด % ใหม่ (ต้องอยู่หลัง reset)
        const col1Width = 8;
        const col2Width = 20;
        const col14Width = 30;
        const remain = 100 - col1Width - col2Width;
        const otherWidth = remain / (totalCols - 2);

        const headers = table.querySelectorAll("thead th");

        headers.forEach((th, i) => {
          if (i === 0) th.style.width = col1Width + "%";
          else if (i === 1) th.style.width = col2Width + "%";
          else th.style.width = otherWidth + "%";
        });

        // 🔥 apply width ให้ td ด้วย (ตัวนี้คุณยังไม่ได้ทำ)
        const rows = table.querySelectorAll("tbody tr");

        rows.forEach(row => {
          const cells = row.children;

          for (let i = 0; i < cells.length; i++) {
            if (i === 0) cells[i].style.width = col1Width + "%";
            else if (i === 1) cells[i].style.width = col2Width + "%";
            else cells[i].style.width = otherWidth + "%";
            if (i === 4) cells[i].style.fontSize = "5px";
            if (i === 3) cells[i].style.fontSize = "5px";
            if (i === 5) cells[i].style.fontSize = "5px";
            if (i === 6) cells[i].style.fontSize = "5px";
            if (i === 7) cells[i].style.fontSize = "5px";
            if (i === 8) cells[i].style.fontSize = "5px";
            if (i === 9) cells[i].style.fontSize = "5px";
            if (i === 10) cells[i].style.fontSize = "5px";
            if (i === 11) cells[i].style.fontSize = "5px";
            if (i === 12) cells[i].style.fontSize = "5px";
          }
        });

        // 🔥 บังคับคอลัมน์ชื่อ
        rows.forEach(row => {
          const cell = row.children[1];
          if (cell) {
            cell.style.whiteSpace = "nowrap";
            cell.style.overflow = "hidden";
            cell.style.textOverflow = "ellipsis";
            cell.style.textAlign = "left";
          }
        });
      }


      function buildPrintableReport() {
  const table = getPrintableTable();
  if (!table) return null;

  const tbody = table.querySelector("tbody");
  if (!tbody) return null;

  const rows = Array.from(tbody.querySelectorAll("tr"));
  if (rows.length === 0) return null;

  const root = document.createElement("div");

  // 🔥 คุม layout ให้ตรง PDF
  root.style.width = "100%";
  root.style.maxWidth = "1123px";   // A4 landscape
  root.style.margin = "0 auto";
  root.style.fontFamily = "'Sarabun', sans-serif";
  root.style.background = "#fff";

  const title = getPrintableTitle();
  const selectedValue = (document.getElementById("selectedValue")?.textContent || "").trim();
  const printedAt = new Date().toLocaleString("th-TH");

  const ROWS_PER_PAGE = 23;
  const totalPages = Math.ceil(rows.length / ROWS_PER_PAGE);

  for (let pageIndex = 0; pageIndex < totalPages; pageIndex++) {

    const page = document.createElement("div");

    // 🔥 margin 4 ด้าน (ปรับตรงนี้ได้เลย)
    page.style.padding = "10mm 12mm 10mm 18mm"; 
    // top right bottom left

    page.style.pageBreakAfter = "always";
    page.style.width = "100%";
    page.style.boxSizing = "border-box";

    // header
    const header = document.createElement("div");
    header.style.display = "flex";
    header.style.justifyContent = "space-between";
    header.style.borderBottom = "2px solid #3c6e71";
    header.style.marginBottom = "5mm";

    header.innerHTML = `
      <div>
        <div style="font-size:14px;font-weight:700;">${title}</div>
        <div style="font-size:10px;">${selectedValue}</div>
      </div>
      <div style="font-size:9px;text-align:right;">
        Page ${pageIndex + 1} / ${totalPages}<br>
        ${printedAt}
      </div>
    `;

    page.appendChild(header);

    // table
    const pageTable = table.cloneNode(false);
    const headClone = table.querySelector("thead").cloneNode(true);
    const bodyClone = document.createElement("tbody");

    const start = pageIndex * ROWS_PER_PAGE;
    const end = start + ROWS_PER_PAGE;

    rows.slice(start, end).forEach(row => {
      bodyClone.appendChild(row.cloneNode(true));
    });

    pageTable.appendChild(headClone);
    pageTable.appendChild(bodyClone);

    // 🔥 สำคัญ: fix layout ไม่ให้เอียง
    pageTable.style.width = "100%";
    pageTable.style.tableLayout = "fixed";

    stylePrintableTable(pageTable);

    page.appendChild(pageTable);
    root.appendChild(page);
  }

  return root;
}
      function printReport() {

      function showLoading(message = "Waiting for loading......") {
        const loading = document.getElementById("loading");
        if (loading) {
          loading.style.display = "block";
          loading.innerText = message;
        }
      }

      function hideLoading() {
        const loading = document.getElementById("loading");
        if (loading) {
          loading.innerText = "";
          loading.style.display = "none";
        }
      }

      function fetchJson(url) {
        return fetch(url).then(response => {
          if (!response.ok) {
            throw new Error("HTTP error: " + response.status);
          }
          return response.json();
        });
      }

      function isAbnormal(value) {
        if (!value) return false;

        const text = String(value).trim();

        return text === "ผิดปกติ" || text.includes("สูง");
      }

      function loadAllRecords() {
        const resultDiv1 = document.getElementById("cbcresult");
        const selectedText = document.getElementById("selectedValue");

        if (resultDiv1) {
          resultDiv1.innerHTML = "";
        }

        const selectedValue = String(
          localStorage.getItem("selectedCustomer") ||
          localStorage.getItem("selectedDropdownValue") ||
          ""
        ).trim();

        console.log("Selected Value:", selectedValue);

        if (selectedText) {
          selectedText.innerText = selectedValue;
        }

        if (!selectedValue) {
          if (resultDiv1) {
            resultDiv1.innerHTML = `
            <tr>
              <td colspan="17" class="text-center text-danger">ไม่พบข้อมูลผู้ใช้ กรุณาเข้าสู่ระบบใหม่</td>
            </tr>
          `;
          }
          return;
        }

        showLoading();

        fetchJson(BASE_URL + "?type=main")
          .then(data => {
            console.log("Data received from API:", data);

            if (!Array.isArray(data) || data.length === 0) {
              if (resultDiv1) {
                resultDiv1.innerHTML = `
                <tr>
                  <td colspan="17" class="text-center text-danger">ไม่พบข้อมูล</td>
                </tr>
              `;
              }
              hideLoading();
              return;
            }

            let found = false;

            data.forEach(row => {
              if (String(row.customer || "").trim() === selectedValue) {
                found = true;

                resultDiv1.innerHTML += `
                <tr>
                <td class="text-center">${row.register || ""}</td>
                  <td class="text-start">${row.name || ""}</td>
                 
                    <td class="text-center ${isAbnormal(row.fbsr) ? 'text-danger-custom' : ''}">
      ${row.fbsr || ""}
    </td>

    <td class="text-center ${isAbnormal(row.cholr) ? 'text-danger-custom' : ''}">
      ${row.cholr || ""}
    </td>

    <td class="text-center ${isAbnormal(row.hdlr) ? 'text-danger-custom' : ''}">
      ${row.hdlr || ""}
    </td>

    <td class="text-center ${isAbnormal(row.ldlr) ? 'text-danger-custom' : ''}">
      ${row.ldlr || ""}
    </td>

    <td class="text-center ${isAbnormal(row.trir) ? 'text-danger-custom' : ''}">
      ${row.trir || ""}
    </td>

    <td class="text-center ${isAbnormal(row.sgptr) ? 'text-danger-custom' : ''}">
      ${row.sgptr || ""}
    </td>

    <td class="doctor-col ${isAbnormal(row.sgotr) ? 'text-danger-custom' : ''}">
      ${row.sgotr || ""}
    </td>
     <td class="text-center ${isAbnormal(row.alkr) ? 'text-danger-custom' : ''}">
      ${row.alkr || ""}
    </td>

    <td class="text-center ${isAbnormal(row.bunr) ? 'text-danger-custom' : ''}">
      ${row.bunr || ""}
    </td>

    <td class="text-center ${isAbnormal(row.crer) ? 'text-danger-custom' : ''}">
      ${row.crer || ""}
    </td>

    <td class="text-center ${isAbnormal(row.uricv) ? 'text-danger-custom' : ''}">
      ${row.uricv || ""}
    </td>

    <td class="doctor-col ${isAbnormal(row.hbr) ? 'text-danger-custom' : ''}">
      ${row.hbr || ""}
    </td>
                </tr>
              `;
              }
            });

            if (!found && resultDiv1) {
              resultDiv1.innerHTML = `
              <tr>
                <td colspan="17" class="text-center text-danger">ไม่พบข้อมูลของผู้ใช้ที่เลือก</td>
              </tr>
            `;
            }

            hideLoading();
          })
          .catch(error => {
            console.error("Error fetching data:", error);

            if (resultDiv1) {
              resultDiv1.innerHTML = `
              <tr>
                <td colspan="17" class="text-center text-danger">เกิดข้อผิดพลาดในการดึงข้อมูล</td>
              </tr>
            `;
            }

            hideLoading();
          });
      }

      document.addEventListener("DOMContentLoaded", loadAllRecords);
