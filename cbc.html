<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">

  <title>รายงานผลตรวจสุขภาพทางอินเตอร์เน็ต</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: 'Sarabun', sans-serif;
      margin: 0;
      background: #ffffff;
    }

    .wrapper {
      display: flex;
      min-height: 100vh;
    }

    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      width: 20%;
      height: 100vh;
      overflow-y: auto;
      background-color: rgb(225, 232, 236);
      color: teal;
      padding: 20px;
      border-right: 1px solid #023636;
      box-shadow: 2px 0 10px rgba(0,0,0,0.2);
    }

    .print-area {
      margin-left: 20%;
      width: 80%;
      min-height: 100vh;
      padding: 24px 48px;
      color: teal;
      overflow-x: auto;
      background: #fff;
    }

    .logo-box {
      width: 100%;
      height: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .logo-box img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .sidebar-menu {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .menu-item {
      display: block;
      padding: 12px 16px;
      color: #555;
      cursor: pointer;
      position: relative;
      text-decoration: none;
    }

    .menu-item:hover {
      background-color: #f0f0f0;
    }

    .menu-item.active {
      background-color: #e6f4ef;
      color: #0f9d7a;
      font-weight: 600;
    }

    .menu-item.active::before {
      content: "";
      position: absolute;
      left: 0;
      top: 0;
      width: 4px;
      height: 100%;
      background-color: #0f9d7a;
      border-radius: 0 4px 4px 0;
    }

    .b-example-divider {
      width: 100%;
      height: 0.1rem;
      background-color: rgba(0, 0, 0, 0.1);
      border: solid rgba(0, 0, 0, .15);
      border-width: 1px 0;
      box-shadow: inset 0 .5em 1.5em rgba(0, 0, 0, .1),
                  inset 0 .125em .5em rgba(0, 0, 0, .15);
    }

    .navbar {
      min-height: 58px;
      border-radius: 4px;
    }

    .table-container {
      width: 100%;
      max-height: 75vh;
      overflow: auto;
      border: 1px solid #b8c7cc;
      border-radius: 8px;
      background: #fff;
    }

    #mainTable {
      width: 100%;
      min-width: 1050px;
      margin-bottom: 0;
      border-collapse: collapse;
      font-size: 0.72rem;
    }

    #mainTable th,
    #mainTable td {
      border: 1px solid #dee2e6;
      padding: 7px 6px;
      text-align: center;
      vertical-align: middle;
      white-space: nowrap;
    }

    #mainTable thead th {
      position: sticky;
      top: 0;
      z-index: 5;
      background: #cff4fc;
      color: #000;
      font-weight: 700;
    }

    .text-danger-custom {
      color: red !important;
      font-weight: 700;
    }

    .pdf-only {
      display: none;
    }

    @media print {
      .sidebar,
      .noprint,
      .btn {
        display: none !important;
      }

      .print-area {
        margin-left: 0 !important;
        width: 100% !important;
        padding: 0 !important;
        color: #000 !important;
      }

      .table-container {
        max-height: none !important;
        overflow: visible !important;
        border: none !important;
      }

      table {
        width: 100% !important;
        font-size: 10px !important;
      }

      th,
      td {
        padding: 6px !important;
        font-size: 10px !important;
        color: #000 !important;
      }

      .navbar {
        background: white !important;
        border-bottom: 2px solid #0f9d7a;
        margin-bottom: 10px;
      }
    }

    .exporting-pdf .wrapper {
  display: none !important;
}

.pdf-capture {
  display: block !important;
  position: static !important;
  width: 297mm !important;
  background: #ffffff !important;
  color: #000 !important;
}
  </style>
</head>

<body>

<div class="wrapper">

  <div class="sidebar">
    <div class="logo-box">
      <img src="pic/Logo.png" alt="logo">
    </div>

    <div class="fs-6 ms-2 mt-2 mb-1">
      รายงานผลตรวจสุขภาพประจำปี
    </div>

    <div id="selectedValue" class="ms-2 mb-5 fs-6 fw-bold noprint"></div>

    <div class="b-example-divider"></div>

    <ul class="sidebar-menu">
      <a href="checkup.html" class="menu-item nav-link mt-3">Dashboard</a>
      <a href="pe.html" class="menu-item nav-link mt-3">ตรวจร่างกายทั่วไป</a>
      <a href="cbc.html" class="menu-item nav-link mt-3 active">ค่าความสมบูรณ์ของเม็ดเลือด</a>
      <a href="chem.html" class="menu-item nav-link mt-3">ผลตรวจเลือดทางเคมี</a>
      <a href="ua.html" class="menu-item nav-link mt-3">ผลตรวจปัสสาวะแบบสมบูรณ์</a>
      <a href="bio.html" class="menu-item nav-link mt-3">ผลทดสอบทางชีวอนามัย</a>
    </ul>
  </div>

  <div class="print-area">

    <div class="navbar bg-body-tertiary px-3 mt-2 mb-3">
      <div class="d-flex w-100 align-items-center justify-content-between">

        <div>
          ค่าความสมบูรณ์ของเม็ดเลือด/Complete Blood Count (CBC)
        </div>

        <div class="noprint">
          <button class="btn btn-outline-primary me-2" onclick="exportPDF()">
            ส่งออก PDF
          </button>

          <a href="index.html" class="btn btn-outline-secondary">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-house" viewBox="0 0 16 16">
              <path d="M8.707 1.5a1 1 0 0 0-1.414 0L.646 8.146a.5.5 0 0 0 .708.708L2 8.207V13.5A1.5 1.5 0 0 0 3.5 15h9a1.5 1.5 0 0 0 1.5-1.5V8.207l.646.647a.5.5 0 0 0 .708-.708L13 5.793V2.5a.5.5 0 0 0-.5-.5h-1a.5.5 0 0 0-.5.5v1.293zM13 7.207V13.5a.5.5 0 0 1-.5.5h-9a.5.5 0 0 1-.5-.5V7.207l5-5z"></path>
            </svg>
          </a>
        </div>

      </div>
    </div>

    <span id="loading" class="fs-5 mt-2 mb-2"></span>

    <div class="table-container mt-3">
      <table class="table table-result" id="mainTable">
        <thead class="table-info">
          <tr>
            <th scope="col" colspan="2">รหัสประจำตัว</th>
            <th scope="col" colspan="3">ชื่อ นามสกุล</th>
            <th scope="col">WBC</th>
            <th scope="col">HGB</th>
            <th scope="col">HCT</th>
            <th scope="col">NEUT</th>
            <th scope="col">LYMPH</th>
            <th scope="col">MONO</th>
            <th scope="col">EOS</th>
            <th scope="col">BASO</th>
            <th scope="col">PLT</th>
            <th scope="col">MCV</th>
            <th scope="col">ผลตรวจ</th>
          </tr>
        </thead>
        <tbody id="cbcresult"></tbody>
      </table>
    </div>

  </div>
</div>

<script>
  const BASE_URL = "https://script.google.com/macros/s/AKfycbxIFqg_sVoBadGiZijEkpghbLBNUiYMO9Zz_5eXxZ_JPSp457PnhJwPCRqTg_Qe8REQPA/exec";

  function getPrintableTable() {
    return document.getElementById("mainTable");
  }

  function getPrintableTitle() {
    const navbar = document.querySelector(".navbar");
    if (!navbar) return document.title || "Report";

    const text = navbar.textContent
      .replace("ส่งออก PDF", "")
      .replace(/\s+/g, " ")
      .trim();

    return text || document.title || "Report";
  }

  function getRowsPerPage(table) {
    const columnCount = table.querySelectorAll("thead tr:last-child th").length || 0;
    if (columnCount >= 15) return 20;
    return 22;
  }

  function fitNameCell(cell) {
    const textLength = cell.textContent.trim().length;
    let fontSize = 8.4;

    if (textLength > 36) fontSize = 7.1;
    else if (textLength > 28) fontSize = 7.6;
    else if (textLength > 22) fontSize = 8;

    cell.style.fontSize = fontSize + "px";
    cell.style.whiteSpace = "nowrap";
    cell.style.overflow = "hidden";
    cell.style.textOverflow = "ellipsis";
  }

  function stylePrintableTable(table) {
    table.style.width = "100%";
    table.style.borderCollapse = "collapse";
    table.style.tableLayout = "fixed";
    table.style.fontSize = "8.4px";
    table.style.color = "#16323f";
    table.style.border = "1px solid #9fb3bf";

    Array.from(table.querySelectorAll("th, td")).forEach(cell => {
      cell.removeAttribute("style");
      cell.style.border = "1px solid #9fb3bf";
      cell.style.padding = "4px 5px";
      cell.style.verticalAlign = "middle";
      cell.style.textAlign = "center";
      cell.style.lineHeight = "1.25";
      cell.style.wordBreak = "break-word";
      cell.style.overflowWrap = "break-word";
    });

    Array.from(table.querySelectorAll("thead th")).forEach(cell => {
      cell.style.background = "#dbeaf1";
      cell.style.color = "#183642";
      cell.style.fontWeight = "700";
      cell.style.fontSize = "8.2px";
    });

    Array.from(table.querySelectorAll("tbody tr")).forEach((row, rowIndex) => {
      if (rowIndex % 2 === 1) {
        row.style.background = "#f7fafc";
      }

      const cells = Array.from(row.children);

      cells.forEach((cell, cellIndex) => {
        if (cell.classList.contains("text-danger-custom")) {
          cell.style.color = "#c62828";
          cell.style.fontWeight = "700";
        }

        if (cellIndex === 0) {
          cell.style.width = "24mm";
          cell.style.whiteSpace = "nowrap";
        }

        if (cellIndex === 1) {
          cell.style.width = "46mm";
          cell.style.maxWidth = "46mm";
          cell.style.textAlign = "left";
          fitNameCell(cell);
        }

        if (cell.classList.contains("text-start")) {
          cell.style.textAlign = "left";
        }
      });
    });
  }

  function buildPrintableReport() {
    const table = getPrintableTable();

    if (!table) {
      alert("ไม่พบตารางสำหรับส่งออก PDF");
      return null;
    }

    const tbody = table.querySelector("tbody");

    if (!tbody) {
      alert("ไม่พบข้อมูลในตาราง");
      return null;
    }

    const sourceRows = Array.from(tbody.querySelectorAll("tr"));

    if (sourceRows.length === 0) {
      alert("ยังไม่มีข้อมูลสำหรับส่งออก PDF");
      return null;
    }

   const root = document.createElement("div");
      root.className = "pdf-capture";
       root.style.width = "297mm";
        root.style.background = "#ffffff";
        root.style.fontFamily = "'Sarabun', sans-serif";
        root.style.color = "#16323f";
    const title = getPrintableTitle();
    const selectedValue = (document.getElementById("selectedValue")?.textContent || "").trim();
    const printedAt = new Date().toLocaleString("th-TH");
    const rowsPerPage = getRowsPerPage(table);
    const totalPages = Math.ceil(sourceRows.length / rowsPerPage);

    for (let pageIndex = 0; pageIndex < totalPages; pageIndex++) {
      const page = document.createElement("section");

      page.style.width = "297mm";
      page.style.minHeight = "210mm";
      page.style.padding = "8mm 9mm 7mm";
      page.style.boxSizing = "border-box";
      page.style.background = "#ffffff";

      if (pageIndex < totalPages - 1) {
        page.style.pageBreakAfter = "always";
      }

      const header = document.createElement("div");
      header.style.display = "flex";
      header.style.justifyContent = "space-between";
      header.style.alignItems = "flex-start";
      header.style.gap = "8mm";
      header.style.marginBottom = "5mm";
      header.style.paddingBottom = "3mm";
      header.style.borderBottom = "2px solid #3c6e71";

      const headerLeft = document.createElement("div");
      headerLeft.style.flex = "1";

      const titleEl = document.createElement("div");
      titleEl.textContent = title;
      titleEl.style.fontSize = "15px";
      titleEl.style.fontWeight = "700";
      titleEl.style.color = "#183642";
      headerLeft.appendChild(titleEl);

      if (selectedValue) {
        const subtitleEl = document.createElement("div");
        subtitleEl.textContent = selectedValue;
        subtitleEl.style.marginTop = "2px";
        subtitleEl.style.fontSize = "10px";
        subtitleEl.style.color = "#4d6a79";
        headerLeft.appendChild(subtitleEl);
      }

      const headerRight = document.createElement("div");
      headerRight.style.textAlign = "right";
      headerRight.style.fontSize = "9.5px";
      headerRight.style.color = "#4d6a79";
      headerRight.innerHTML =
        "<div>Page " + (pageIndex + 1) + " / " + totalPages + "</div>" +
        "<div>" + printedAt + "</div>";

      header.appendChild(headerLeft);
      header.appendChild(headerRight);
      page.appendChild(header);

      const pageTable = table.cloneNode(false);
      const headClone = table.querySelector("thead").cloneNode(true);
      const bodyClone = document.createElement("tbody");

      const pageRows = sourceRows.slice(
        pageIndex * rowsPerPage,
        (pageIndex + 1) * rowsPerPage
      );

      pageRows.forEach(row => {
        bodyClone.appendChild(row.cloneNode(true));
      });

      pageTable.appendChild(headClone);
      pageTable.appendChild(bodyClone);

      stylePrintableTable(pageTable);

      page.appendChild(pageTable);
      root.appendChild(page);
    }

    return root;
  }

  async function exportPDF() {
  const report = buildPrintableReport();
  if (!report) return;

  document.body.appendChild(report);

  // รอให้ browser วาดตารางก่อน
  await new Promise(resolve => setTimeout(resolve, 800));

  const opt = {
    margin: 0,
    filename: "รายงาน_CBC.pdf",
    image: {
      type: "jpeg",
      quality: 0.98
    },
    html2canvas: {
      scale: 2,
      useCORS: true,
      backgroundColor: "#ffffff",
      scrollX: 0,
      scrollY: 0
    },
    jsPDF: {
      unit: "mm",
      format: "a4",
      orientation: "landscape"
    },
    pagebreak: {
      mode: ["css", "legacy"]
    }
  };

  html2pdf()
    .set(opt)
    .from(report)
    .save()
    .then(() => {
      document.body.removeChild(report);
    });
}
  function showLoading(message = "Waiting for loading......") {
    const loading = document.getElementById("loading");

    if (loading) {
      loading.style.display = "block";
      loading.innerText = message;
    }
  }

  function hideLoading() {
    const loading = document.getElementById("loading");

    if (loading) {
      loading.innerText = "";
      loading.style.display = "none";
    }
  }

  function fetchJson(url) {
    return fetch(url).then(response => {
      if (!response.ok) {
        throw new Error("HTTP error: " + response.status);
      }

      return response.json();
    });
  }

  function isAbnormal(value) {
    if (!value) return false;

    const text = String(value).trim();

    return text === "ผิดปกติ" || text.includes("สูง") || text.includes("ต่ำ");
  }

  function loadAllRecords() {
    const resultDiv1 = document.getElementById("cbcresult");
    const selectedText = document.getElementById("selectedValue");

    if (resultDiv1) {
      resultDiv1.innerHTML = "";
    }

    const selectedValue = String(
      localStorage.getItem("selectedCustomer") ||
      localStorage.getItem("selectedDropdownValue") ||
      ""
    ).trim();

    if (selectedText) {
      selectedText.innerText = selectedValue;
    }

    if (!selectedValue) {
      if (resultDiv1) {
        resultDiv1.innerHTML = `
          <tr>
            <td colspan="16" class="text-center text-danger">
              ไม่พบข้อมูลผู้ใช้ กรุณาเข้าสู่ระบบใหม่
            </td>
          </tr>
        `;
      }
      return;
    }

    showLoading();

    fetchJson(BASE_URL + "?type=main")
      .then(data => {
        if (!Array.isArray(data) || data.length === 0) {
          if (resultDiv1) {
            resultDiv1.innerHTML = `
              <tr>
                <td colspan="16" class="text-center text-danger">
                  ไม่พบข้อมูล
                </td>
              </tr>
            `;
          }

          hideLoading();
          return;
        }

        let found = false;

        data.forEach(row => {
          if (String(row.customer || "").trim() === selectedValue) {
            found = true;

            resultDiv1.innerHTML += `
              <tr>
                <th class="text-center" scope="row" colspan="2">${row.register || ""}</th>
                <td class="text-start" colspan="3">${row.name || ""}</td>
                <td class="text-center">${row.bwbc || ""}</td>
                <td class="text-center">${row.hemo || ""}</td>
                <td class="text-center">${row.hema || ""}</td>
                <td class="text-center">${row.neu || ""}</td>
                <td class="text-center">${row.lym || ""}</td>
                <td class="text-center">${row.mono || ""}</td>
                <td class="text-center">${row.eos || ""}</td>
                <td class="text-center">${row.bas || ""}</td>
                <td class="text-center">${row.plat || ""}</td>
                <td class="text-center">${row.mcv || ""}</td>
                <td class="text-center ${isAbnormal(row.cbc) ? 'text-danger-custom' : ''}">
                  ${row.cbc || ""}
                </td>
              </tr>
            `;
          }
        });

        if (!found && resultDiv1) {
          resultDiv1.innerHTML = `
            <tr>
              <td colspan="16" class="text-center text-danger">
                ไม่พบข้อมูลของผู้ใช้ที่เลือก
              </td>
            </tr>
          `;
        }

        hideLoading();
      })
      .catch(error => {
        console.error("Error fetching data:", error);

        if (resultDiv1) {
          resultDiv1.innerHTML = `
            <tr>
              <td colspan="16" class="text-center text-danger">
                เกิดข้อผิดพลาดในการดึงข้อมูล
              </td>
            </tr>
          `;
        }

        hideLoading();
      });
  }

  document.addEventListener("DOMContentLoaded", loadAllRecords);
</script>

<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

</body>
</html>
