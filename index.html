<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>เช็คผลตรวจสุขภาพประจำปีด้วยตนเอง</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    html, body {
      height: 100%;
      margin: 0;
    }

    body {
      font-family: 'Sarabun', sans-serif;
      background-image: url("pic/bgs.png");
      background-size: cover;
      background-position: center;
      background-attachment: fixed;

      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .main-content {
      flex: 1;
    }

    /* LOGO */
    .nav-logo {
      width: 45px;
      height: auto;
    }

    /* TEXT */
    .bigfont {
      font-size: 3rem;
      color: #0099cc;
    }

    /* IMAGE */
    .hero-img {
      width: 100%;
      height: auto;
      border-radius: 12px;
    }

    /* CARD */
    .main-card {
      background: rgba(255, 255, 255, 0.95);
      border-radius: 15px;
      padding: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
    }

    /* FLOAT ICON */
    #floating-img {
      position: fixed;
      bottom: 30px;
      right: 20px;
      width: 70px;
      height: 70px;
      z-index: 9999;
    }

    /* FOOTER */
    .footer {
      width: 100%;
      border-top: 1px solid #bcd9e6;
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(3px);
      margin-top: 20px;
    }

    .footer-inner {
      max-width: 1320px;
      margin: 0 auto;
      padding: 10px 20px;
      font-size: 11px;
      color: #555;

      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 15px;
      flex-wrap: wrap;
    }

    .footer-left {
      line-height: 1.4;
    }

    .footer-right a {
      color: #007bff;
      text-decoration: none;
      font-weight: 600;
    }

    .footer-right a:hover {
      text-decoration: underline;
    }

    /* MOBILE */
    @media (max-width: 768px) {
      .nav-logo {
        width: 30px;
      }

      .bigfont {
        font-size: 2rem;
        text-align: center;
      }

      h1 {
        font-size: 1.4rem;
        text-align: center;
      }

      .lead {
        font-size: 0.8rem;
        text-align: center;
      }

      .btn {
        width: 100%;
      }

      .main-card {
        padding: 15px;
      }

      .footer-inner {
        flex-direction: column;
        text-align: center;
        font-size: 10px;
      }

      #floating-img {
        width: 60px;
        height: 60px;
        bottom: 20px;
        right: 15px;
      }
    }
  </style>
</head>

<body>

  <div class="main-content">
    <div class="container py-3">

      <!-- HEADER -->
      <header class="d-flex flex-wrap justify-content-between align-items-center border-bottom pb-3 mb-4" style="background-color: white;">

        <div class="d-flex align-items-center">
         
          <span class="fw-bold text-info">ฝ่ายงานบริการตรวจสุขภาพเคลื่อนที่</span>
        </div>

        <div class="fw-bold me-5" style="color: #00acc1;">
         Online Results
        </div>

      </header>

      <!-- CONTENT -->
      <div class="main-card">
        <div class="row align-items-center">

          <!-- IMAGE -->
          <div class="col-12 col-lg-6 mb-3">
            <img src="https://img2.pic.in.th/pic/-282f2dab186d5afab.png" class="hero-img" alt="Check up">
          </div>

          <!-- TEXT -->
          <div class="col-12 col-lg-6">

            <h2 class="bigfont fw-bold">CHECK UP</h2>

            <h1 class="fw-bold mb-3">Check it by yourself.</h1>

            <p class="lead">
              บริการเช็คผลการตรวจสุขภาพประจำปีด้วยตนเองทางอินเตอร์เน็ต
            </p>

            <div class="d-grid gap-2 d-md-flex">
              <a href="personal.html" class="btn btn-outline-primary fw-bold">
                สำหรับบุคคลทั่วไป
              </a>

              <a href="main.html" class="btn btn-outline-success fw-bold">
                สำหรับสถานประกอบการ
              </a>
            </div>

          </div>

        </div>
      </div>

    </div>
  </div>

  <!-- FLOAT BUTTON -->
  <a id="floating-img" href="https://lin.ee/6KvgXbZ" target="_blank">
    <img src="https://img2.pic.in.th/pic/admin-contact-1.png" style="width:100%; height:100%;" alt="LINE Contact">
  </a>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="footer-inner">
      <div class="footer-left">
       จัดทำโดยแผนกตรวจสุขภาพเคลื่อนที่ (Mobile Check up)
      </div>
      <div class="footer-right">
        
      </div>
    </div>
  </footer>

</body>

</html>
